<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Text Case Converter</title>
    </head>

    <body>
        <input type="text" id="textInput" placeholder="Enter text here">

        <br><br>

        <input type="radio" name="caseOption" value="upper" onclick="convertText()"> UpperCase;
        <input type="radio" name="caseOption" value="lower" onclick="convertText()"> LowerCase;
        <input type="radio" name="caseOption" value="asis" onclick="convertText()"> AsIs;

        <p id="output"></p>

</html>
