<!DOCTYPE html>
<html>
<head>
<title> NewUser Login </title>
</head>

<body>

	<h2> NewUser Login form </h2>
	
	<form action="#" method="post">
	
<label for="firstname">Enter Firstname:</label>
<input type="text" id="firstname" name="firstname">

<br></br>

<label for="lastname">Enter Lastname:</label>
<input type="text" id="lastname" name="lastname">

<br></br>

<label for="username">Enter Username:</label>
<input type="text" id="username" name="username">

<br></br>

<label> Gender: </label> <br></br>
<input type="radio" name="gender">Male
<input type="radio" name="gender">Female

<br></br>

<label> Known Languages: </label> <br></br>
<input type="checkbox" name="language">English
<input type="checkbox" name="language">Marathi
<input type="checkbox" name="language">Hindi

<br></br>

<label for="email">Enter Email:</label>
<input type="email" id="email" name="email">

<br></br>

<label for="password">Enter Password:</label>
<input type="password" id="password" name="password">

<br></br>

<label for="password">Re-Enter Password:</label>
<input type="password" id="password" name="password">

<br></br>

<button type="submit">Register</button>

</form>
</body>
</html>
